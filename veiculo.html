<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Veículo — Rafa Top Car</title>
<link rel="icon" href="assets/rafa-logo.jpg">
<style>
body{margin:0;background:#0b0b0b;font-family:Inter,system-ui,sans-serif}
.rtc-h1,.rtc-h2,.rtc-h3{font-family:Oswald,sans-serif;text-transform:uppercase;margin:0}
.rtc-btn{border:none;cursor:pointer;font-family:Inter,sans-serif;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px}
a{color:#d81f26}
a:hover{color:#ef4b4b}
.spec{background:#161616;border:1px solid #262626;border-radius:8px;padding:14px}
.spec .k{color:#777;font-size:11px;font-weight:600;margin-bottom:4px}
.spec .v{color:#fff;font-size:15px;font-weight:700}
.thumb{width:64px;height:64px;object-fit:cover;border-radius:6px;border:2px solid #262626;cursor:pointer;flex:0 0 auto}
.thumb.active{border-color:#d81f26}
.rel-card{display:block;text-decoration:none;background:#161616;border:1px solid #262626;border-radius:8px;overflow:hidden}
.rel-card .ph{position:relative;aspect-ratio:1;overflow:hidden}
.rel-card .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .35s ease}
.rel-card:hover .ph img{transform:scale(1.06)}
</style>
</head>
<body>
<div style="background:#0b0b0b;min-height:100vh">

<header style="display:flex;align-items:center;justify-content:space-between;padding:14px clamp(16px,4vw,40px);background:#0b0b0b;border-bottom:1px solid #262626;flex-wrap:wrap;gap:12px;row-gap:12px">
<div style="display:flex;align-items:center;gap:12px">
<img src="assets/rafa-logo.jpg" alt="Rafa Top Car" style="height:44px;width:44px;object-fit:cover;border-radius:50%;border:2px solid #d81f26">
<div class="rtc-h2" style="color:#fff;font-size:17px">RAFA TOP CAR</div>
</div>
<nav style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;row-gap:10px">
<a href="index.html" style="text-decoration:none;color:#eee;font-size:14px;font-weight:600">Estoque</a>
<a href="Rafa Top Car - Avalie seu Carro.dc.html" style="text-decoration:none;color:#eee;font-size:14px;font-weight:600">Avalie seu Carro</a>
<a href="Rafa Top Car - Contacto.dc.html" style="text-decoration:none;color:#eee;font-size:14px;font-weight:600">Contacto</a>
<a href="https://wa.me/351912910662?text=Ol%C3%A1!%20Vim%20pelo%20site%20da%20Rafa%20Top%20Car%20e%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es." target="_blank" rel="noopener" class="rtc-btn" style="background:#25D366;color:#fff;padding:9px 18px;border-radius:24px;font-size:13px;text-decoration:none"><img src="https://cdn.simpleicons.org/whatsapp/ffffff" alt="" style="width:16px;height:16px">912 910 662</a>
</nav>
</header>

<div style="padding:16px clamp(16px,4vw,40px) 0;max-width:1400px;margin:0 auto">
<a href="index.html" style="text-decoration:none;color:#999;font-size:13px">← Voltar ao estoque</a>
</div>

<div id="content"></div>

<footer style="padding:20px clamp(16px,4vw,40px);background:#0b0b0b;text-align:center;color:#888;font-size:12px;border-top:1px solid #262626">
Rua Dr António dos Santos 81, 3850-830 Santo António de Vagos · 912 910 662
</footer>

<a href="https://wa.me/351912910662?text=Ol%C3%A1!%20Vim%20pelo%20site%20da%20Rafa%20Top%20Car%20e%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es." target="_blank" rel="noopener" style="position:fixed;right:20px;bottom:20px;z-index:50;background:#25D366;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 6px 18px rgba(0,0,0,.4)"><img src="https://cdn.simpleicons.org/whatsapp/ffffff" alt="WhatsApp" style="width:28px;height:28px"></a>

</div>

<script>
const fmtNum = n => n.toLocaleString('pt-PT');
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const pad2 = n => String(n).padStart(2, '0');

const id = new URLSearchParams(location.search).get('id');

fetch('cars.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const all = data.vehicles || [];
    const car = all.find(c => c.id === id);
    if (!car) {
      document.getElementById('content').innerHTML =
        '<div style="text-align:center;padding:80px 20px;color:#999;font-size:14px">Veículo não encontrado ou já vendido.<br><br><a href="index.html">Ver todo o estoque →</a></div>';
      return;
    }
    render(car, all.filter(c => c.id !== id));
  });

function render(car, others) {
  document.title = car.name + ' — Rafa Top Car';

  const anoLabel = car.month ? pad2(car.month) + '/' + car.year : String(car.year);
  const specs = [
    ['ANO', anoLabel],
    ['QUILOMETRAGEM', fmtNum(car.km) + ' km'],
    ['COMBUSTÍVEL', car.fuel],
    ['CAIXA', car.gearbox],
    ['POTÊNCIA', car.power],
    ['COR', car.color],
    ['LUGARES', car.seats]
  ].filter(([, v]) => v !== undefined && v !== null && v !== '');

  const waMsg = encodeURIComponent(`Olá! Vim pelo site da Rafa Top Car e tenho interesse no ${car.name} (€${fmtNum(car.price)}).`);
  const subLine = [car.year, fmtNum(car.km) + ' km', car.fuel, car.gearbox].filter(Boolean).join(' · ');
  const photos = car.photos && car.photos.length ? car.photos : [''];

  document.getElementById('content').innerHTML = `
  <section style="display:flex;flex-wrap:wrap;gap:30px;padding:16px clamp(16px,4vw,40px) 40px;max-width:1400px;margin:0 auto;align-items:flex-start">

    <div style="flex:2 1 420px">
      <div style="position:relative;aspect-ratio:4/5;max-height:640px;border-radius:10px;overflow:hidden;background:#161616">
        <img id="mainPhoto" src="${esc(photos[0])}" alt="${esc(car.name)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
        ${car.sold ? '<div style="position:absolute;top:14px;left:14px;background:#555;color:#fff;font-size:12px;font-weight:700;padding:6px 12px;border-radius:4px">VENDIDO</div>' : ''}
      </div>
      ${photos.length > 1 ? `<div style="display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:4px">
        ${photos.map((p, i) => `<img class="thumb${i === 0 ? ' active' : ''}" src="${esc(p)}" data-i="${i}" alt="Foto ${i + 1}">`).join('')}
      </div>` : ''}

      <div style="margin-top:30px">
        <div class="rtc-h2" style="color:#fff;font-size:18px;margin-bottom:14px">FICHA TÉCNICA</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px">
          ${specs.map(([k, v]) => `<div class="spec"><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`).join('')}
        </div>
      </div>

      ${car.equipment && car.equipment.length ? `<div style="margin-top:30px">
        <div class="rtc-h2" style="color:#fff;font-size:18px;margin-bottom:12px">EQUIPAMENTO</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${car.equipment.map(e => `<div style="background:#161616;border:1px solid #262626;color:#ccc;font-size:12px;font-weight:600;padding:8px 14px;border-radius:20px">✔ ${esc(e)}</div>`).join('')}
        </div>
      </div>` : ''}

      ${car.description ? `<div style="margin-top:30px">
        <div class="rtc-h2" style="color:#fff;font-size:18px;margin-bottom:12px">DESCRIÇÃO</div>
        <p style="color:#bbb;font-size:14px;line-height:1.7;margin:0;white-space:pre-line">${esc(car.description)}</p>
      </div>` : ''}
    </div>

    <aside style="flex:1 1 280px;position:sticky;top:16px;display:flex;flex-direction:column;gap:16px">
      <div style="background:#161616;border:1px solid #262626;border-radius:10px;padding:24px">
        <div class="rtc-h2" style="color:#fff;font-size:22px;line-height:1.2">${esc(car.name)}</div>
        <div style="color:#999;font-size:13px;margin-top:8px">${esc(subLine)}</div>
        <div style="color:#d81f26;font-size:32px;font-weight:700;margin-top:18px;font-family:Oswald,sans-serif">€${fmtNum(car.price)}</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">
          <div style="color:#ccc;font-size:13px">✔ Financiamento disponível</div>
          <div style="color:#ccc;font-size:13px">✔ Aceitamos retoma</div>
          <div style="color:#ccc;font-size:13px">✔ Garantia 18 meses por mútuo acordo</div>
          <div style="color:#ccc;font-size:13px">✔ Entrega em todo o país</div>
        </div>
        <a href="https://wa.me/351912910662?text=${waMsg}" target="_blank" rel="noopener" class="rtc-btn" style="background:#25D366;color:#fff;padding:14px;border-radius:8px;font-size:15px;text-decoration:none;width:100%;margin-top:18px;box-sizing:border-box">📲 Falar com Rafael</a>
        <a href="tel:+351912910662" class="rtc-btn" style="background:#0f0f0f;border:1px solid #333;color:#eee;padding:14px;border-radius:8px;font-size:15px;text-decoration:none;width:100%;margin-top:10px;box-sizing:border-box">Ligar: 912 910 662</a>
      </div>
      <div style="background:#161616;border:1px solid #262626;border-radius:10px;padding:20px">
        <div class="rtc-h3" style="color:#fff;font-size:13px;margin-bottom:10px">LOJA</div>
        <div style="color:#bbb;font-size:13px;line-height:1.6">Rua Dr António dos Santos 81<br>3850-830 Santo António de Vagos<br>Portugal</div>
      </div>
    </aside>
  </section>

  ${others.length ? `<section style="padding:10px clamp(16px,4vw,40px) 40px;max-width:1400px;margin:0 auto">
    <div class="rtc-h2" style="color:#fff;font-size:18px;margin-bottom:16px">OUTROS VEÍCULOS</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:6px">
      ${others.map(o => `
      <a class="rel-card" href="veiculo.html?id=${encodeURIComponent(o.id)}">
        <div class="ph"><img src="${esc((o.photos && o.photos[0]) || '')}" alt="${esc(o.name)}" loading="lazy"></div>
        <div style="padding:8px 10px">
          <div style="color:#fff;font-size:12px;font-weight:700">${esc(o.name)}</div>
          <div style="color:#d81f26;font-size:12px;font-weight:700">€${fmtNum(o.price)}</div>
        </div>
      </a>`).join('')}
    </div>
  </section>` : ''}`;

  document.querySelectorAll('.thumb').forEach(t => t.onclick = () => {
    document.getElementById('mainPhoto').src = t.src;
    document.querySelectorAll('.thumb').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
}
</script>
</body>
</html>
